<html>
    <head>
        <title> My first webpage</title>
    </head>
    <body>
        <!-- Block Level Tags -->
        <h1> This is h1 </h1>
        <h2> This is h2 </h2>
        <h3> This is h3 </h3>
        <p> This is a paragraph </p>
        <div> This is a div </div>

        <input type="text">

        <br>
        <img height="200px" src="https://raw.githubusercontent.com/muKaustav/ShortURL/master/client/src/assets/images/shorurl.jpg" alt="Chitkara University">

        <!-- unordered list -->
        <ul>
            <li>MongoDB</li>
            <li>Express</li>

             <ol start="4" type="i">
                <li>HTML</li>

                <li>JavaScript</li>
             </ol>

                    <td>Aman</td>

                </tr>
                <tr>
                    <td>John</td>
